services:
  scraperguard:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      SCRAPERGUARD_CONFIG: /app/config.yaml

  scraperguard-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: scraperguard
      POSTGRES_USER: scraperguard
      POSTGRES_PASSWORD: scraperguard
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
